<!-- Модальное окно для коммерческого предложения -->
<div class="modal fade" id="quoteModal" tabindex="-1" aria-labelledby="quoteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <!-- Состояние 1: Форма -->
            <div id="quoteFormState">
                <div class="modal-header">
                    <h5 class="modal-title" id="quoteModalLabel">📄 Коммерческое предложение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="quoteForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price_cpu" class="form-label">CPU (₽/ядро/день)</label>
                                <input type="number" step="0.01" id="price_cpu" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="price_ram" class="form-label">RAM (₽/ГБ/день)</label>
                                <input type="number" step="0.01" id="price_ram" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="price_nvme" class="form-label">NVMe (₽/ГБ/день)</label>
                                <input type="number" step="0.01" id="price_nvme" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="price_hdd" class="form-label">HDD (₽/ГБ/день)</label>
                                <input type="number" step="0.01" id="price_hdd" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="col-md-12 mt-3">
                            <label class="fw-bold">Наценки на ресурсы (%)</label>
                        </div>
                        <div class="row mt-2">
                            <div class="col-md-3">
                                <label for="markup_cpu" class="form-label">CPU</label>
                                <input type="number" step="0.1" id="markup_cpu" value="30" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label for="markup_ram" class="form-label">RAM</label>
                                <input type="number" step="0.1" id="markup_ram" value="38" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label for="markup_nvme" class="form-label">NVMe</label>
                                <input type="number" step="0.1" id="markup_nvme" value="0" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label for="markup_hdd" class="form-label">HDD</label>
                                <input type="number" step="0.1" id="markup_hdd" value="20" class="form-control">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="generateQuoteBtn">Сформировать</button>
                </div>
            </div>

            <!-- Состояние 2: Результат (изначально скрыто) -->
            <div id="quoteResultState" style="display: none;">
                <div class="modal-header">
                    <h5 class="modal-title">КОММЕРЧЕСКОЕ ПРЕДЛОЖЕНИЕ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="quoteInfo"></p>
                    <div class="table-responsive">
                        <table class="table table-sm table-bordered" id="quoteTable">
                            <thead>
                                <tr><th>Сервер</th><th>CPU</th><th>RAM</th><th>NVMe</th><th>HDD</th><th>Ст./день</th><th>Ст./30 дней</th></tr>
                            </thead>
                            <tbody id="quoteTableBody"></tbody>
                            <tfoot>
                                <tr class="table-active fw-bold">
                                    <td>ИТОГО:</a>
                                    <td id="total_cpu"></a>
                                    <td id="total_ram"></a>
                                    <td id="total_nvme"></a>
                                    <td id="total_hdd"></a>
                                    <td id="total_price_day"></a>
                                    <td id="total_price_month"></a>
                                </a>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="copyTextBtn">📋 Копировать текст</button>
                    <button type="button" class="btn btn-secondary" id="downloadCsvBtn">📎 Скачать CSV</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>
</div>

{% extends "base.html" %}

{% block title %}{% if client %}Редактировать клиента{% else %}Новый клиент{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>{% if client %}Редактировать клиента{% else %}Добавить клиента{% endif %}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название клиента</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ client.name if client else '' }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/clients" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

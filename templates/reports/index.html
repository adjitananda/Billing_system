{% extends "base.html" %}

{% block title %}Отчёты{% endblock %}

{% block content %}
<h1 class="mb-4">Формирование отчётов</h1>

<div class="card">
    <div class="card-header">
        <h5>Параметры отчёта</h5>
    </div>
    <div class="card-body">
        <form method="post" id="reportForm">
            <div class="mb-3">
                <label for="report_type" class="form-label">Тип отчёта</label>
                <select class="form-select" id="report_type" name="report_type" required>
                    <option value="summary">Сводный отчёт по всем клиентам</option>
                    <option value="client">Отчёт по клиенту</option>
                    <option value="server">История сервера</option>
                </select>
            </div>
            
            <div class="mb-3" id="client_block" style="display: none;">
                <label for="client_id" class="form-label">Клиент</label>
                <select class="form-select" id="client_id" name="client_id">
                    <option value="">Выберите клиента</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3" id="server_block" style="display: none;">
                <label for="server_id" class="form-label">Сервер (ID)</label>
                <input type="number" class="form-control" id="server_id" name="server_id" placeholder="ID сервера">
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="start_date" class="form-label">Дата начала</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="end_date" class="form-label">Дата окончания</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Сформировать отчёт</button>
        </form>
    </div>
</div>

<div id="report_result" class="mt-4" style="display: none;">
    <div class="card">
        <div class="card-header">
            <h5>Результат отчёта</h5>
        </div>
        <div class="card-body">
            <div id="report_content"></div>
        </div>
    </div>
</div>

<script>
    const reportType = document.getElementById('report_type');
    const clientBlock = document.getElementById('client_block');
    const serverBlock = document.getElementById('server_block');
    
    reportType.addEventListener('change', function() {
        clientBlock.style.display = 'none';
        serverBlock.style.display = 'none';
        if (this.value === 'client') {
            clientBlock.style.display = 'block';
        } else if (this.value === 'server') {
            serverBlock.style.display = 'block';
        }
    });
    
    function formatNumber(value) {
        return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
    }
    
    function renderSummaryReport(data) {
        let html = `<h6>Период: ${data.period.start} — ${data.period.end}</h6>`;
        html += `<h4 class="text-success">Итого: ${formatNumber(data.total)} ₽</h4>`;
        
        if (data.clients && data.clients.length > 0) {
            html += `<table class="table table-striped mt-3">
                <thead>
                    <tr><th>Клиент</th><th>Количество серверов</th><th>Сумма (₽)</th></tr>
                </thead>
                <tbody>`;
            for (const client of data.clients) {
                html += `<tr>
                    <td>${client.client_name}</td>
                    <td>${client.server_count}</td>
                    <td>${formatNumber(client.amount)}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
        } else if (data.months && data.months.length > 0) {
            html += `<table class="table table-striped mt-3">
                <thead><tr><th>Месяц</th><th>Сумма (₽)</th></tr></thead>
                <tbody>`;
            for (const month of data.months) {
                html += `<tr><td>${month.month}</td><td>${formatNumber(month.amount)}</td></tr>`;
            }
            html += `</tbody></table>`;
        } else if (data.days && data.days.length > 0) {
            html += `<table class="table table-striped mt-3">
                <thead><tr><th>Дата</th><th>Сумма (₽)</th></tr></thead>
                <tbody>`;
            for (const day of data.days) {
                html += `<tr><td>${day.date}</td><td>${formatNumber(day.amount)}</td></tr>`;
            }
            html += `</tbody></table>`;
        }
        
        return html;
    }
    
    function renderClientReport(data) {
        let html = `<h6>Клиент: ${data.client_name}</h6>`;
        html += `<h6>Период: ${data.period.start} — ${data.period.end}</h6>`;
        html += `<h4 class="text-success">Итого: ${formatNumber(data.total_amount)} ₽</h4>`;
        
        if (data.servers && data.servers.length > 0) {
            html += `<table class="table table-striped mt-3">
                <thead>
                    <tr><th>Сервер</th><th>Дней</th><th>Сумма (₽)</th></tr>
                </thead>
                <tbody>`;
            for (const server of data.servers) {
                html += `<tr>
                    <td>${server.server_name}</td>
                    <td>${server.days}</td>
                    <td>${formatNumber(server.amount)}</td>
                </tr>`;
            }
            html += `<tr class="table-active"><td colspan="2"><strong>Итого</strong></td>
                     <td><strong>${formatNumber(data.total_amount)}</strong></td></tr>`;
            html += `</tbody></table>`;
        }
        
        if (data.daily_breakdown && data.daily_breakdown.length > 0) {
            html += `<h6 class="mt-4">Дневная разбивка</h6>
                <table class="table table-sm table-striped">
                    <thead><tr><th>Дата</th><th>Сумма (₽)</th></tr></thead>
                    <tbody>`;
            for (const day of data.daily_breakdown) {
                html += `<tr><td>${day.date}</td><td>${formatNumber(day.amount)}</td></tr>`;
            }
            html += `</tbody></table>`;
        }
        
        return html;
    }
    
    function renderServerReport(data) {
        let html = `<h6>Сервер: ${data.server_name} (ID: ${data.server_id})</h6>`;
        html += `<h6>Клиент: ${data.client_name}</h6>`;
        html += `<h6>Период: ${data.period.start} — ${data.period.end}</h6>`;
        html += `<h4 class="text-success">Итого: ${formatNumber(data.total_amount)} ₽</h4>`;
        html += `<p>Всего дней: ${data.days}</p>`;
        
        if (data.daily_breakdown && data.daily_breakdown.length > 0) {
            html += `<table class="table table-striped mt-3">
                <thead>
                    <tr><th>Дата</th><th>CPU</th><th>RAM</th><th>NVMe</th><th>HDD</th><th>Стоимость (₽)</th></tr>
                </thead>
                <tbody>`;
            for (const day of data.daily_breakdown) {
                html += `<tr>
                    <td>${day.date}</td>
                    <td>${day.cpu_cores}</td>
                    <td>${day.ram_gb} ГБ</td>
                    <td>${day.nvme_gb} ГБ</td>
                    <td>${day.sata_gb} ГБ</td>
                    <td>${formatNumber(day.cost)}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }
        
        if (data.config_changes && data.config_changes.length > 0) {
            html += `<h6 class="mt-4">Изменения конфигурации</h6>
                <table class="table table-sm table-striped">
                    <thead><tr><th>Дата</th><th>CPU</th><th>RAM</th><th>NVMe</th><th>HDD</th></tr></thead>
                    <tbody>`;
            for (const change of data.config_changes) {
                html += `<tr>
                    <td>${change.effective_from}</td>
                    <td>${change.cpu_cores}</td>
                    <td>${change.ram_gb} ГБ</td>
                    <td>${change.nvme_gb} ГБ</td>
                    <td>${change.sata_gb} ГБ</td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }
        
        return html;
    }
    
    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const reportType = formData.get('report_type');
        let url = '';
        
        if (reportType === 'summary') {
            url = `/api/v1/reports/summary?start_date=${formData.get('start_date')}&end_date=${formData.get('end_date')}`;
        } else if (reportType === 'client') {
            const clientId = formData.get('client_id');
            if (!clientId) { alert('Выберите клиента'); return; }
            url = `/api/v1/reports/client/${clientId}?start_date=${formData.get('start_date')}&end_date=${formData.get('end_date')}`;
        } else if (reportType === 'server') {
            const serverId = formData.get('server_id');
            if (!serverId) { alert('Введите ID сервера'); return; }
            url = `/api/v1/reports/server/${serverId}?start_date=${formData.get('start_date')}&end_date=${formData.get('end_date')}`;
        }
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            let html = '';
            if (reportType === 'summary') {
                html = renderSummaryReport(data);
            } else if (reportType === 'client') {
                html = renderClientReport(data);
            } else if (reportType === 'server') {
                html = renderServerReport(data);
            }
            
            document.getElementById('report_content').innerHTML = html;
            document.getElementById('report_result').style.display = 'block';
        } catch (error) {
            alert('Ошибка при формировании отчёта: ' + error.message);
        }
    });
</script>
{% endblock %}

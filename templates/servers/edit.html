{% extends "base.html" %}

{% block title %}Редактировать сервер{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Редактировать сервер: {{ server.name }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название сервера</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ server.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="purpose" class="form-label">Назначение</label>
                        <select class="form-select" id="purpose" name="purpose">
                            <option value="web" {% if server.purpose == 'web' %}selected{% endif %}>Web-сервер</option>
                            <option value="database" {% if server.purpose == 'database' %}selected{% endif %}>База данных</option>
                            <option value="app" {% if server.purpose == 'app' %}selected{% endif %}>Приложение</option>
                            <option value="other" {% if server.purpose == 'other' %}selected{% endif %}>Другое</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="os" class="form-label">Операционная система</label>
                        <select class="form-select" id="os" name="os">
                            <option value="ubuntu22" {% if server.os == 'ubuntu22' %}selected{% endif %}>Ubuntu 22.04</option>
                            <option value="ubuntu20" {% if server.os == 'ubuntu20' %}selected{% endif %}>Ubuntu 20.04</option>
                            <option value="debian12" {% if server.os == 'debian12' %}selected{% endif %}>Debian 12</option>
                            <option value="centos7" {% if server.os == 'centos7' %}selected{% endif %}>CentOS 7</option>
                            <option value="rocky9" {% if server.os == 'rocky9' %}selected{% endif %}>Rocky Linux 9</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="cpu_cores" class="form-label">CPU (ядра)</label>
                            <input type="number" class="form-control" id="cpu_cores" name="cpu_cores" value="{{ server.cpu_cores }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ram_gb" class="form-label">RAM (ГБ)</label>
                            <input type="number" class="form-control" id="ram_gb" name="ram_gb" value="{{ server.ram_gb }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="hdd_gb" class="form-label">HDD (ГБ)</label>
                            <input type="number" class="form-control" id="hdd_gb" name="hdd_gb" value="{{ server.hdd_gb or 0 }}" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">NVMe диски (ГБ)</label>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme1_gb" placeholder="NVMe 1" value="{{ server.nvme1_gb or 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme2_gb" placeholder="NVMe 2" value="{{ server.nvme2_gb or 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme3_gb" placeholder="NVMe 3" value="{{ server.nvme3_gb or 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme4_gb" placeholder="NVMe 4" value="{{ server.nvme4_gb or 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme5_gb" placeholder="NVMe 5" value="{{ server.nvme5_gb or 0 }}" min="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/servers/{{ server.id }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Редактировать сервер{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Редактировать сервер: {{ server.name }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название сервера</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ server.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="physical_server_id" class="form-label">Физический сервер (хост)</label>
                        <select class="form-select" id="physical_server_id" name="physical_server_id" required>
                            {% for ps in physical_servers %}
                            <option value="{{ ps.id }}" {% if server.physical_server_id == ps.id %}selected{% endif %}>
                                {{ ps.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="purpose" class="form-label">Назначение</label>
                        <input type="text" class="form-control" id="purpose" name="purpose" value="{{ server.purpose if server.purpose else '' }}" placeholder="Например: Web-сервер, База данных">
                    </div>
                    
                    <div class="mb-3">
                        <label for="os" class="form-label">Операционная система</label>
                        <input type="text" class="form-control" id="os" name="os" value="{{ server.os if server.os else '' }}" placeholder="Например: Ubuntu 22.04, Windows Server 2022">
                    </div>
                    
                    <div class="mb-3">
                        <label for="ip_address" class="form-label">IP-адрес (с портом)</label>
                        <input type="text" class="form-control" id="ip_address" name="ip_address" value="{{ server.ip_address if server.ip_address else '' }}" placeholder="Например: 192.168.1.100:22">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="cpu_cores" class="form-label">CPU (ядра)</label>
                            <input type="number" class="form-control" id="cpu_cores" name="cpu_cores" value="{{ server.cpu_cores }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ram_gb" class="form-label">RAM (ГБ)</label>
                            <input type="number" class="form-control" id="ram_gb" name="ram_gb" value="{{ server.ram_gb }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="hdd_gb" class="form-label">HDD (ГБ)</label>
                            <input type="number" class="form-control" id="hdd_gb" name="hdd_gb" value="{{ server.hdd_gb }}" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">NVMe диски (ГБ)</label>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme1_gb" placeholder="NVMe 1" value="{{ server.nvme1_gb }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme2_gb" placeholder="NVMe 2" value="{{ server.nvme2_gb }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme3_gb" placeholder="NVMe 3" value="{{ server.nvme3_gb }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme4_gb" placeholder="NVMe 4" value="{{ server.nvme4_gb }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme5_gb" placeholder="NVMe 5" value="{{ server.nvme5_gb }}" min="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/servers/{{ server.id }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

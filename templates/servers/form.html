{% extends "base.html" %}

{% block title %}{% if server %}Редактировать сервер{% else %}Новый сервер{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>{% if server %}Редактировать сервер{% else %}Добавить сервер{% endif %}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название сервера</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ server.name if server else '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="client_id" class="form-label">Клиент</label>
                        <select class="form-select" id="client_id" name="client_id" required>
                            <option value="">Выберите клиента</option>
                            {% for client in clients %}
                            <option value="{{ client.id }}" {% if (client_id and client_id == client.id) or (server and server.client_id == client.id) %}selected{% endif %}>
                                {{ client.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="physical_server_id" class="form-label">Физический сервер (хост)</label>
                        <select class="form-select" id="physical_server_id" name="physical_server_id" required>
                            <option value="">Выберите хост</option>
                            {% for ps in physical_servers %}
                            <option value="{{ ps.id }}" {% if server and server.physical_server_id == ps.id %}selected{% endif %}>
                                {{ ps.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="purpose" class="form-label">Назначение</label>
                        <input type="text" class="form-control" id="purpose" name="purpose" value="{{ server.purpose if server else '' }}" placeholder="Например: Web-сервер, База данных, Приложение">
                    </div>
                    
                    <div class="mb-3">
                        <label for="os" class="form-label">Операционная система</label>
                        <input type="text" class="form-control" id="os" name="os" value="{{ server.os if server else '' }}" placeholder="Например: Ubuntu 22.04, Windows Server 2022, Debian 12">
                    </div>
                    
                    <div class="mb-3">
                        <label for="ip_address" class="form-label">IP-адрес (с портом)</label>
                        <input type="text" class="form-control" id="ip_address" name="ip_address" value="{{ server.ip_address if server else '' }}" placeholder="Например: 192.168.1.100:22 или 10.0.0.1">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="cpu_cores" class="form-label">CPU (ядра)</label>
                            <input type="number" class="form-control" id="cpu_cores" name="cpu_cores" value="{{ server.cpu_cores if server else 1 }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ram_gb" class="form-label">RAM (ГБ)</label>
                            <input type="number" class="form-control" id="ram_gb" name="ram_gb" value="{{ server.ram_gb if server else 1 }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="hdd_gb" class="form-label">HDD (ГБ)</label>
                            <input type="number" class="form-control" id="hdd_gb" name="hdd_gb" value="{{ server.hdd_gb if server else 0 }}" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">NVMe диски (ГБ)</label>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme1_gb" placeholder="NVMe 1" value="{{ server.nvme1_gb if server else 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme2_gb" placeholder="NVMe 2" value="{{ server.nvme2_gb if server else 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme3_gb" placeholder="NVMe 3" value="{{ server.nvme3_gb if server else 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme4_gb" placeholder="NVMe 4" value="{{ server.nvme4_gb if server else 0 }}" min="0">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="number" class="form-control" name="nvme5_gb" placeholder="NVMe 5" value="{{ server.nvme5_gb if server else 0 }}" min="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/servers" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
